version: '3.8'

services:
  # -------------------------------------------------------
  # سرویس ۱: وب‌سایت (Flask + SSE)
  # مسئول نمایش رابط کاربری و ارتباط با تلویزیون
  # -------------------------------------------------------
  web:
    build: .
    container_name: Lyraz_web_local
    restart: always
    command: gunicorn --worker-class gevent --workers 1 --threads 100 --bind 0.0.0.0:5000 app:app
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    env_file: .env

  # -------------------------------------------------------
  # سرویس ۲: ربات تلگرام (مجهز به پورت Webhook)
  # مسئول دریافت پیام‌ها و تعامل با کاربر
  # -------------------------------------------------------
  bot:
    build: .
    container_name: Lyraz_bot_local
    restart: always
    command: python bot_runner.py
    ports:
      - "8443:8443"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - web

  # -------------------------------------------------------
  # سرویس ۳: کارگر (Worker)
  # مسئول دانلودهای سنگین از یوتیوب و پردازش پس‌زمینه
  # -------------------------------------------------------
  worker:
    build: .
    container_name: Lyraz_worker_local
    restart: always
    command: python worker.py
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - web