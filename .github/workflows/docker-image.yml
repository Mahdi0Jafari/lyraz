name: Lyraz Player Production CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 120s
          script: |
            set -e
            echo "🚀 STARTING DEPLOYMENT..."

            export DEPLOY_DIR="/home/ubuntu/deploy"
            mkdir -p $DEPLOY_DIR/instance $DEPLOY_DIR/logs
            sudo chown -R $USER:$USER $DEPLOY_DIR
            cd $DEPLOY_DIR

            # فایل‌های محیطی
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
            echo "BOT_USERNAME=${{ secrets.BOT_USERNAME }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "STORAGE_CHANNEL_ID=${{ secrets.STORAGE_CHANNEL_ID }}" >> .env
            
            # 🔥 کلیدهای جدید اسپاتیفای اضافه شدند
            echo "SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}" >> .env
            echo "SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}" >> .env
            
            printf "%s" "${{ secrets.YT_COOKIES }}" > instance/cookies.txt
            chmod 644 instance/cookies.txt

            echo "⬇️ Pulling image..."
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest

            echo "🌐 Setting up Network..."
            sudo docker network create Lyraz_network || true

            # ---------------------------------------------------------
            # 🔥 بخش حیاتی: آزادسازی پورت 5001 به روش سامورایی! 🔥
            # ---------------------------------------------------------
            echo "🛑 Killing ANYTHING on port 5001..."
            
            # 1. پیدا کردن کانتینری که پورت 5001 را گرفته
            OLD_CONTAINER=$(sudo docker ps -q --filter "publish=5001")
            if [ ! -z "$OLD_CONTAINER" ]; then
                echo "Found zombie container $OLD_CONTAINER on port 5001. Killing it..."
                sudo docker stop $OLD_CONTAINER
                sudo docker rm $OLD_CONTAINER
            fi

            # 2. پاک کردن کانتینرهای هم‌نام (محض اطمینان)
            # اسم Lyraz_app مربوط به نسخه قدیمی است
            sudo docker stop Lyraz_web Lyraz_bot Lyraz_worker Lyraz_app || true
            sudo docker rm Lyraz_web Lyraz_bot Lyraz_worker Lyraz_app || true
            # ---------------------------------------------------------

            echo "🔥 Starting WEB container..."
            sudo docker run -d \
              --name Lyraz_web \
              --restart always \
              --network Lyraz_network \
              --network-alias web \
              -p 5001:5000 \
              -v $DEPLOY_DIR/instance:/app/instance \
              -v $DEPLOY_DIR/logs:/app/logs \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest \
              gunicorn --worker-class gevent --workers 1 --threads 100 --bind 0.0.0.0:5000 app:app

            echo "🤖 Starting BOT container..."
            sudo docker run -d \
              --name Lyraz_bot \
              --restart always \
              --network Lyraz_network \
              -v $DEPLOY_DIR/instance:/app/instance \
              -v $DEPLOY_DIR/logs:/app/logs \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest \
              python bot_runner.py

            echo "👷 Starting WORKER container..."
            sudo docker run -d \
              --name Lyraz_worker \
              --restart always \
              --network Lyraz_network \
              -v $DEPLOY_DIR/instance:/app/instance \
              -v $DEPLOY_DIR/logs:/app/logs \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest \
              python worker.py

            echo "🧹 Cleanup..."
            sudo docker image prune -f

            echo "✅ FINAL STATUS:"
            sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"