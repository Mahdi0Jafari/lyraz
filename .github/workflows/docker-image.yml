name: Fanus Player Production CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 120s # زمان بیشتر برای اطمینان
          script: |
            set -e
            echo "🚀 STARTING RAW DOCKER DEPLOYMENT..."

            # 1. آماده‌سازی مسیرها
            export DEPLOY_DIR="/home/ubuntu/deploy"
            mkdir -p $DEPLOY_DIR/instance $DEPLOY_DIR/logs
            sudo chown -R $USER:$USER $DEPLOY_DIR
            cd $DEPLOY_DIR

            # 2. ساخت فایل .env
            echo "🔐 Generating .env file..."
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
            echo "BOT_USERNAME=${{ secrets.BOT_USERNAME }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "STORAGE_CHANNEL_ID=${{ secrets.STORAGE_CHANNEL_ID }}" >> .env

            # 3. تزریق کوکی‌ها
            printf "%s" "${{ secrets.YT_COOKIES }}" > instance/cookies.txt
            chmod 644 instance/cookies.txt

            # 4. دریافت آخرین ایمیج
            echo "⬇️ Pulling latest image..."
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest

            # 5. ساخت شبکه داخلی (برای اینکه ربات بتونه با وب حرف بزنه)
            echo "🌐 Setting up Network..."
            sudo docker network create fanus_network || true

            # 6. توقف و حذف کانتینرهای قدیمی (تمیزکاری دستی)
            echo "🛑 Stopping old containers..."
            sudo docker stop fanus_web fanus_bot fanus_worker || true
            sudo docker rm fanus_web fanus_bot fanus_worker || true

            # 7. اجرای کانتینر WEB
            echo "🔥 Starting WEB container..."
            sudo docker run -d \
              --name fanus_web \
              --restart always \
              --network fanus_network \
              --network-alias web \
              -p 5001:5000 \
              -v $DEPLOY_DIR/instance:/app/instance \
              -v $DEPLOY_DIR/logs:/app/logs \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest \
              gunicorn --worker-class gevent --workers 1 --threads 100 --bind 0.0.0.0:5000 app:app

            # 8. اجرای کانتینر BOT
            echo "🤖 Starting BOT container..."
            sudo docker run -d \
              --name fanus_bot \
              --restart always \
              --network fanus_network \
              -v $DEPLOY_DIR/instance:/app/instance \
              -v $DEPLOY_DIR/logs:/app/logs \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest \
              python bot_runner.py

            # 9. اجرای کانتینر WORKER
            echo "👷 Starting WORKER container..."
            sudo docker run -d \
              --name fanus_worker \
              --restart always \
              --network fanus_network \
              -v $DEPLOY_DIR/instance:/app/instance \
              -v $DEPLOY_DIR/logs:/app/logs \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest \
              python worker.py

            # 10. پاکسازی نهایی
            echo "🧹 Pruning unused images..."
            sudo docker image prune -f

            echo "✅ STATUS CHECK:"
            sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"