name: Fanus Player Production CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # بهینه‌سازی: استفاده از کش گیت‌هاب برای بیلد سریع‌تر
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # 1. آماده‌سازی پوشه‌ها و دسترسی‌ها
            export DEPLOY_DIR="/home/ubuntu/deploy"
            mkdir -p $DEPLOY_DIR/instance
            mkdir -p $DEPLOY_DIR/logs
            
            # تغییر مالکیت پوشه به یوزر جاری (جلوگیری از مشکلات Permission)
            sudo chown -R $USER:$USER $DEPLOY_DIR
            cd $DEPLOY_DIR

            # 2. ساخت فایل .env از Secrets گیت‌هاب
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
            echo "BOT_USERNAME=${{ secrets.BOT_USERNAME }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "STORAGE_CHANNEL_ID=${{ secrets.STORAGE_CHANNEL_ID }}" >> .env

            # 3. تزریق کوکی‌ها (حیاتی برای دانلودر یوتیوب)
            printf "%s" "${{ secrets.YT_COOKIES }}" > instance/cookies.txt
            chmod 644 instance/cookies.txt

            # 4. ساخت فایل docker-compose.yml نهایی (معماری ۳ بخشی)
            cat <<EOF > docker-compose.yml
            version: '3.8'
            
            services:
              # --- سرویس ۱: وب‌سایت (مدیریت درخواست‌ها و SSE) ---
              web:
                image: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
                container_name: fanus_web
                restart: always
                # تنظیمات خاص Gevent برای هندل کردن SSE در یک پروسه
                command: gunicorn --worker-class gevent --workers 1 --threads 100 --bind 0.0.0.0:5000 app:app
                ports:
                  - "5001:5000"
                volumes:
                  - ./instance:/app/instance
                  - ./logs:/app/logs
                env_file: .env

              # --- سرویس ۲: ربات تلگرام (Logic & Interaction) ---
              bot:
                image: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
                container_name: fanus_bot
                restart: always
                command: python bot_runner.py
                volumes:
                  - ./instance:/app/instance
                  - ./logs:/app/logs
                env_file: .env

              # --- سرویس ۳: کارگر پس‌زمینه (Huey Worker) ---
              # وظیفه: دانلود فایل‌ها و پردازش‌های سنگین
              worker:
                image: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
                container_name: fanus_worker
                restart: always
                command: python worker.py
                volumes:
                  - ./instance:/app/instance
                  - ./logs:/app/logs
                env_file: .env
            EOF

            # 5. دریافت آخرین نسخه و اجرای مجدد
            echo "🔄 Pulling latest images..."
            sudo docker-compose pull
            
            echo "🚀 Restarting stack..."
            # این دستور کانتینرهای قدیمی را حذف و جدیدها را می‌سازد
            sudo docker-compose up -d --remove-orphans

            echo "🧹 Cleaning up unused images..."
            sudo docker image prune -f