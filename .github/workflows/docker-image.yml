name: Fanus Player Production CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # ------------------------------------------------------------------
  # JOB 1: BUILD & PUSH (ساخت ایمیج و ارسال به داکر هاب)
  # ------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
          # بهینه‌سازی کش برای سرعت بیلد بالا
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # JOB 2: DEPLOY (استقرار روی سرور VPS)
  # ------------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # تنظیم تایم‌اوت‌ها برای جلوگیری از قطع شدن
          timeout: 60s 
          command_timeout: 10m
          script: |
            # توقف اسکریپت در صورت بروز هرگونه خطا
            set -e

            echo "========================================"
            echo "🚀 STARTING DEPLOYMENT: $(date)"
            echo "========================================"

            # 1. آماده‌سازی مسیرها
            export DEPLOY_DIR="/home/ubuntu/deploy"
            echo "📂 Setting up directories in $DEPLOY_DIR..."
            
            mkdir -p $DEPLOY_DIR/instance
            mkdir -p $DEPLOY_DIR/logs
            
            # تغییر مالکیت به کاربر فعلی
            sudo chown -R $USER:$USER $DEPLOY_DIR
            cd $DEPLOY_DIR

            # 2. ساخت فایل .env
            echo "🔐 Generating .env file..."
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
            echo "BOT_USERNAME=${{ secrets.BOT_USERNAME }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "STORAGE_CHANNEL_ID=${{ secrets.STORAGE_CHANNEL_ID }}" >> .env

            # 3. تزریق کوکی‌ها
            echo "🍪 Injecting YouTube Cookies..."
            printf "%s" "${{ secrets.YT_COOKIES }}" > instance/cookies.txt
            chmod 644 instance/cookies.txt

            # 4. ساخت فایل docker-compose.yml
            echo "📝 Creating docker-compose.yml..."
            cat <<EOF > docker-compose.yml
            version: '3.8'
            
            services:
              web:
                image: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
                container_name: fanus_web
                restart: always
                command: gunicorn --worker-class gevent --workers 1 --threads 100 --bind 0.0.0.0:5000 app:app
                ports:
                  - "5001:5000"
                volumes:
                  - ./instance:/app/instance
                  - ./logs:/app/logs
                env_file: .env

              bot:
                image: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
                container_name: fanus_bot
                restart: always
                command: python bot_runner.py
                volumes:
                  - ./instance:/app/instance
                  - ./logs:/app/logs
                env_file: .env

              worker:
                image: ${{ secrets.DOCKER_USERNAME }}/musicplayer-web:latest
                container_name: fanus_worker
                restart: always
                command: python worker.py
                volumes:
                  - ./instance:/app/instance
                  - ./logs:/app/logs
                env_file: .env
            EOF

            # 5. عملیات نوسازی داکر (با استفاده از Syntax جدید V2)
            echo "⬇️ Pulling latest images..."
            # 🔥 تغییر حیاتی: حذف خط فاصله (docker compose)
            sudo docker compose pull

            echo "🛑 Stopping and removing old containers..."
            sudo docker compose down --remove-orphans

            echo "🔥 Starting new containers (Force Recreate)..."
            sudo docker compose up -d --force-recreate

            # 6. پاکسازی و لاگ‌های تایید
            echo "🧹 Cleaning up..."
            sudo docker image prune -f

            echo "========================================"
            echo "✅ DEPLOYMENT FINISHED!"
            echo "📊 Docker Compose Status:"
            sudo docker compose ps
            
            echo "========================================"
            echo "🕒 Container Uptime Check:"
            sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"