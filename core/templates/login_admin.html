<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen flex items-center justify-center">
    
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">Admin Access</h1>
            <p class="text-gray-400 text-sm mt-2">Enter your secure password</p>
        </div>
        
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-lg mb-6 text-sm text-center flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-6">
            <div>
                <input type="password" name="password" placeholder="••••••••" required autofocus
                       class="w-full bg-gray-900 border border-gray-600 rounded-xl px-4 py-3.5 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-center tracking-widest text-xl placeholder-gray-600">
            </div>
            
            <button type="submit" 
                    class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3.5 rounded-xl transition transform active:scale-95 shadow-lg shadow-green-900/20 flex items-center justify-center gap-2">
                <span>Unlock Panel</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-gray-500 text-sm hover:text-white transition flex items-center justify-center gap-1 group">
                <span class="group-hover:-translate-x-1 transition-transform">←</span>
                Back to Music Player
            </a>
        </div>
    </div>

</body>
</html>
