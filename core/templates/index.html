<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Lyraz Hub">
    
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    
    <title>Lyraz Live Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#0df233", dark: "#050505", surface: "#121212" },
                    fontFamily: { 
                        sans: ["Inter", "sans-serif"], 
                        display: ["Space Grotesk", "sans-serif"],
                        vazir: ["Vazirmatn", "sans-serif"]
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 1s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 24px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .will-change-transform { will-change: transform; }
        .glass-panel { background: rgba(18, 18, 18, 0.6); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); }
    </style>
</head>
<body ondblclick="toggleFullScreen()" class="bg-dark text-white h-[100dvh] w-full overflow-hidden relative font-sans flex items-center justify-center select-none">

    <script>
        window.INJECTED_TOKEN = "{{ token|default('', true) }}";
        window.HUB_STATUS = "{{ session.status if session else 'waiting' }}";
    </script>

    <div class="absolute inset-0 z-0 pointer-events-none">
        <div id="bg-blur" class="absolute inset-0 bg-center bg-cover blur-[50px] lg:blur-[80px] opacity-40 scale-110 transition-all duration-[2000ms] will-change-transform"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/80 to-black"></div>
    </div>

    <div id="login-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/95 backdrop-blur-3xl transition-opacity duration-700 p-6 {% if session and session.status == 'active' %}hidden opacity-0 pointer-events-none{% endif %}">
        <div class="relative group cursor-pointer transform hover:scale-105 transition-transform duration-500">
            <div class="absolute -inset-1 bg-gradient-to-r from-primary to-blue-500 rounded-[2.2rem] blur-xl opacity-40 group-hover:opacity-75 transition duration-1000"></div>
            <div class="relative bg-white p-5 rounded-[2rem] shadow-2xl mb-8">
                <div id="qrcode" class="w-[50vw] h-[50vw] max-w-[240px] max-h-[240px] flex items-center justify-center overflow-hidden"></div>
            </div>
        </div>
        <h1 class="text-4xl lg:text-6xl font-display font-bold mb-4 tracking-tight text-white drop-shadow-lg text-center leading-tight">Start the Party</h1>
        <div class="flex items-center gap-3 text-gray-300 bg-white/10 px-6 py-3 lg:px-8 lg:py-4 rounded-full border border-white/5 backdrop-blur-md animate-pulse-slow max-w-[90%] text-center">
            <i class="ri-qr-scan-2-line text-primary text-2xl"></i>
            <p class="text-sm lg:text-base font-medium">Scan to add music via <b>Telegram</b></p>
        </div>
    </div>

    <main id="main-player" class="relative z-10 
                 w-full h-full lg:w-[96vw] lg:h-[94dvh] xl:max-w-[1600px] 
                 lg:rounded-[2.5rem] 
                 lg:glass-panel flex flex-col lg:flex-row 
                 overflow-hidden transition-all duration-700 lg:shadow-2xl lg:border lg:border-white/10
                 {% if session and session.status == 'active' %}opacity-100 scale-100{% else %}opacity-0 scale-95{% endif %}">
        
        <section class="w-full flex-1 lg:flex-none lg:w-[360px] xl:w-[420px] 
                        p-8 lg:p-10
                        flex flex-col justify-center items-center relative z-30
                        border-b border-transparent lg:border-r lg:border-white/5 bg-transparent lg:bg-black/20 pt-safe">
            
            <div class="relative 
                        w-[80vw] max-w-[340px] lg:w-full lg:max-w-[360px] aspect-square 
                        rounded-[2rem] lg:rounded-[2.5rem] 
                        overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] 
                        mb-8 border border-white/10 group">
                
                <img id="cover-art" class="w-full h-full object-cover transition-transform duration-[3s] ease-in-out group-hover:scale-105" 
                     src="https://placehold.co/800?text=Waiting..." alt="Album Art">
                
                     <div id="admin-badge" class="absolute top-4 left-4 bg-black/60 backdrop-blur-xl px-3 py-1.5 rounded-full text-xs font-bold border border-white/10 hidden shadow-xl flex items-center gap-2 z-20 transition-opacity duration-500">
                        <span class="text-primary animate-pulse shadow-[0_0_10px_#0df233] rounded-full">●</span> 
                        <span id="admin-name" class="truncate max-w-[120px] font-mono tracking-wide text-gray-200 uppercase">
                            HUB
                        </span>
                    </div>
            </div>

            <div class="w-full text-center space-y-2 px-2">
                <h1 id="track-title" class="text-3xl lg:text-4xl font-display font-bold truncate leading-tight tracking-tight drop-shadow-lg">Ready to Play</h1>
                <p id="track-artist" class="text-lg lg:text-xl text-gray-400 truncate font-medium">Waiting for tracks...</p>
                <p id="track-adder" class="text-xs font-mono text-gray-500 mt-3 hidden items-center justify-center gap-1.5 bg-white/5 inline-flex px-3 py-1.5 rounded-lg">
                    <i class="ri-user-smile-line text-primary"></i> Added by <span id="added-by-name" class="text-gray-300 font-bold"></span>
                </p>
            </div>
        </section>

        <section class="w-full lg:flex-1 shrink-0 flex flex-col 
                        px-6 lg:px-12 
                        pb-safe lg:py-10 
                        z-30 relative min-w-0">
            
            <div class="w-full h-full flex flex-col justify-end lg:justify-between max-w-5xl mx-auto">
                
                <div id="lyrics-panel" class="hidden lg:flex flex-1 w-full min-h-[200px]
                                            flex-col items-center 
                                            overflow-y-auto no-scrollbar lyrics-mask text-center 
                                            transition-all duration-300 font-vazir mb-8">
                     <div class="h-full flex items-center justify-center p-4 w-full">
                        <p class="text-white/30 text-3xl xl:text-5xl font-bold tracking-wide dir-auto leading-relaxed">Lyrics will appear here</p>
                     </div>
                </div>

                <div class="w-full flex flex-col gap-6 lg:gap-8 mb-6 lg:mb-0">
                    
                    <div class="w-full group relative">
                        <input type="range" id="seek-slider" min="0" max="100" value="0" step="0.1"
                               class="absolute inset-0 w-full h-full opacity-0 z-20 cursor-pointer touch-manipulation">
                        
                        <div class="relative h-2.5 lg:h-3 bg-white/10 rounded-full overflow-hidden pointer-events-none transition-all duration-300 group-hover:h-3 lg:group-hover:h-4">
                            <div id="progress-fill" class="absolute h-full bg-primary rounded-full transition-all duration-100 w-0"></div>
                            <div id="thumb" class="absolute h-full w-2.5 bg-white rounded-full shadow opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>

                        <div class="flex justify-between text-xs lg:text-sm font-mono text-gray-400 mt-3 font-bold pointer-events-none px-1">
                            <span id="curr-time">0:00</span>
                            <span id="total-time">--:--</span>
                        </div>
                    </div>

                    <div class="flex items-center justify-between lg:justify-center gap-2 lg:gap-14 w-full">
                        
                        <button id="btn-shuffle" class="text-gray-400 hover:text-white transition-all rounded-full p-3 flex items-center justify-center active:scale-90" onclick="toggleShuffle()">
                            <i class="ri-shuffle-line text-2xl lg:text-3xl"></i>
                        </button>
                        
                        <div class="flex items-center gap-6 lg:gap-10">
                            <button class="text-white hover:text-primary transition-all rounded-full p-2 flex items-center justify-center active:scale-90" onclick="prevTrack()">
                                <i class="ri-skip-back-fill text-4xl lg:text-5xl"></i>
                            </button>
                            
                            <button id="play-btn" class="bg-primary text-black rounded-full 
                                           size-20 lg:size-24
                                           hover:scale-105 active:scale-95 shadow-[0_0_40px_rgba(13,242,51,0.3)] 
                                           flex items-center justify-center transition-all shrink-0" onclick="playPause()">
                                <i id="icon-play" class="ri-play-fill text-4xl lg:text-[44px] ml-1.5"></i>
                                <i id="icon-pause" class="ri-pause-fill text-4xl lg:text-[44px] hidden"></i>
                            </button>
                            
                            <button class="text-white hover:text-primary transition-all rounded-full p-2 flex items-center justify-center active:scale-90" onclick="nextTrack()">
                                <i class="ri-skip-forward-fill text-4xl lg:text-5xl"></i>
                            </button>
                        </div>
                        
                        <button id="btn-repeat" class="text-gray-400 hover:text-white transition-all rounded-full p-3 flex items-center justify-center active:scale-90" onclick="toggleRepeat()">
                            <i class="ri-repeat-2-line text-2xl lg:text-3xl"></i>
                            <i class="ri-repeat-one-line text-2xl lg:text-3xl hidden"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <aside class="hidden xl:flex w-[340px] 2xl:w-[400px] bg-black/40 flex-col border-l border-white/5 backdrop-blur-md shrink-0">
            <div class="p-8 border-b border-white/5 sticky top-0 z-40 flex justify-between items-center bg-transparent">
                <h2 class="font-bold text-2xl flex items-center gap-3 text-white font-display tracking-wide">
                    <i class="ri-play-list-2-fill text-primary"></i> Queue
                </h2>
                <span id="track-count" class="text-xs bg-white/10 px-3 py-1.5 rounded-md text-white font-mono border border-white/10">0</span>
            </div>
            <div id="playlist-container" class="flex-1 overflow-y-auto p-6 space-y-3 custom-scroll"></div>
        </aside>

    </main>

    <div id="corner-qr" class="fixed bottom-10 right-10 z-[100] items-end gap-5 transition-all duration-700 hidden max-xl:!hidden xl:flex origin-bottom-right opacity-0 translate-y-10 {% if session and session.status == 'active' %}xl:!flex xl:!opacity-100 xl:!translate-y-0 max-xl:!hidden{% endif %}">
        <div class="bg-black/80 backdrop-blur-xl text-white px-6 py-4 rounded-2xl border border-white/10 shadow-2xl mb-2">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Want to play a song?</p>
            <p class="text-sm font-bold flex items-center gap-2">
                Scan to Add Music 
                <i class="ri-arrow-right-line text-primary text-lg"></i>
            </p>
        </div>
        <div class="p-4 rounded-2xl transition-transform duration-300 hover:scale-105 cursor-none bg-white shadow-[0_20px_40px_rgba(0,0,0,0.5)]">
            <div id="mini-qrcode" class="w-24 h-24 mix-blend-multiply flex justify-center items-center"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/lyrics.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/player.js') }}"></script>
    
    <script>
        if(typeof isLyricsViewActive !== 'undefined') { isLyricsViewActive = true; }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (window.INJECTED_TOKEN && window.HUB_STATUS === 'active') {
                const qrUrl = `${window.location.origin}/connect/${window.INJECTED_TOKEN}`;
                const miniQrBox = document.getElementById('mini-qrcode');
                if (miniQrBox && typeof QRCode !== 'undefined') {
                    new QRCode(miniQrBox, { 
                        text: qrUrl, width: 96, height: 96, 
                        colorDark: "#050505", colorLight: "#ffffff", 
                        correctLevel: QRCode.CorrectLevel.L 
                    });
                }
            }
        });
    </script>
</body>
</html>
